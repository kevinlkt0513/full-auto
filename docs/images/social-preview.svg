<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none" stroke-linecap="round" stroke-linejoin="round" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
  <title>Gpt-Agreement-Payment — social preview</title>

  <!-- 背景 -->
  <rect width="1280" height="640" fill="#0d1117"/>

  <!-- 装饰：左上 + 右下角的协议栈层条纹 -->
  <g stroke="#21262d" stroke-width="1">
    <line x1="0" y1="80"  x2="320" y2="80"/>
    <line x1="0" y1="120" x2="320" y2="120"/>
    <line x1="0" y1="160" x2="320" y2="160"/>
    <line x1="960"  y1="480" x2="1280" y2="480"/>
    <line x1="960"  y1="520" x2="1280" y2="520"/>
    <line x1="960"  y1="560" x2="1280" y2="560"/>
  </g>

  <!-- Logo（左侧，居中竖直）-->
  <g transform="translate(140 200) scale(0.94)">
    <circle cx="128" cy="128" r="100" stroke="#e6edf3" stroke-width="8"/>
    <line x1="128" y1="36" x2="128" y2="220" stroke="#e6edf3" stroke-width="3" opacity="0.35"/>
    <rect x="78" y="78" width="42" height="42" fill="#e6edf3" fill-opacity="0.18"/>
    <rect x="136" y="136" width="42" height="42" fill="#e6edf3" fill-opacity="0.18"/>
    <rect x="78" y="78" width="42" height="42" stroke="#e6edf3" stroke-width="2.5"/>
    <rect x="136" y="136" width="42" height="42" stroke="#e6edf3" stroke-width="2.5"/>
    <g stroke="#e6edf3" stroke-width="8">
      <line x1="60" y1="128" x2="186" y2="128"/>
      <polyline points="170,112 188,128 170,144" fill="none"/>
    </g>
  </g>

  <!-- 标题与副标题（右侧）-->
  <text x="440" y="290" font-size="84" font-weight="700" fill="#e6edf3" letter-spacing="-1.5">Gpt-Agreement-Payment</text>

  <text x="440" y="350" font-size="30" fill="#8b949e">ChatGPT Team 订阅协议端到端重放工具</text>
  <text x="440" y="392" font-size="30" fill="#8b949e">含 hCaptcha 视觉求解器与反欺诈实证数据</text>

  <!-- 三条核心 -->
  <g font-size="22" fill="#7d8590" font-family="ui-monospace, monospace">
