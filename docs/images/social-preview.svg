    <text x="440" y="510">▸  daemon  ·  12 路自愈环 · 无人值守跑数周</text>
    <text x="440" y="550">▸  研究材料  ·  IP 字符串级指纹 / 批次关联实证</text>
  </g>

  <!-- 右下角 license / use -->
  <text x="1240" y="610" text-anchor="end" font-size="18" fill="#484f58" font-family="ui-monospace, monospace">MIT  ·  CTF / bug bounty only  ·  AS IS</text>
</svg>
